</head>
<table>
    <tr><td>imeOn true </td><td><input type="text" data-imeOn="true"> </td></tr>
    <tr><td>imeOn false</td><td><input type="text" data-imeOn="false"> </td></tr>
    <tr><td>imemode imeOn</td><td><input type="text" data-imemode="imeOn"> </td></tr>
    <tr><td>imemode imeOff</td><td><input type="text" data-imemode="imeOff"> </td></tr>
    <tr><td>imemode hiragana</td><td><input type="text" data-imemode="hiragana"> </td></tr>
    <tr><td>imemode katakana</td><td><input type="text" data-imemode="katakana"> </td></tr>
    <tr><td>imemode hankakukana</td><td><input type="text" data-imemode="hankakukana"> </td></tr>
</table>
<footer>
    <script >// 適切なイベントリスナーを追加

        document
            .querySelectorAll('[data-imemode]')
            .forEach(e => {
                var localImemode = e.dataset['imemode']
                e.addEventListener("focus", (e) => {
                    console.log("test.html: imemode [" + localImemode + "]");
                    
                    const event = new CustomEvent("imemode", {
                        detail: { imemode: localImemode },
                    });
                    window.dispatchEvent(event);

                });

            });
        document
            .querySelectorAll('[data-imeon]')
            .forEach(e => {
                var localImeOne = e.dataset['imeon']
                e.addEventListener("focus", (e) => {
                    console.log("test.html: imeOn [" + localImeOne + "]");
                    
                    const event = new CustomEvent("imemode", {
                        detail: { imeOn: localImeOne },
                    });
                    window.dispatchEvent(event);

                });

            });
</script>
</footer>
</html>
